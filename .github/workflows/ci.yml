name: CI

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'web/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rustfmt.toml'
      - 'clippy.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'web/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rustfmt.toml'
      - 'clippy.toml'
      - '.github/workflows/ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - 'clippy.toml'
            web:
              - 'web/**'

  web:
    name: Web (build + lint + test)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npm run build
      - run: cd web && npx prettier --check .
      - run: cd web && npx eslint .
      - run: cd web && npx tsc --noEmit
      - run: cd web && npx vitest run
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/build/
          retention-days: 1

  # Build web for Rust jobs even when web source didn't change
  # (Rust embed needs web/build/ to exist)
  web-build-only:
    name: Web build (for Rust)
    needs: changes
    if: needs.changes.outputs.rust == 'true' && needs.changes.outputs.web != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/build/
          retention-days: 1

  fmt:
    name: Format
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: [changes, web, web-build-only]
    if: |
      always() &&
      needs.changes.outputs.rust == 'true' &&
      (needs.web.result == 'success' || needs.web-build-only.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web/build/
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    needs: [changes, web, web-build-only]
    if: |
      always() &&
      needs.changes.outputs.rust == 'true' &&
      (needs.web.result == 'success' || needs.web-build-only.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web/build/
      - run: sudo apt-get update && sudo apt-get install -y tmux
      - run: cargo test --workspace

  coverage:
    name: Coverage (100% lines)
    needs: [changes, web, web-build-only]
    if: |
      always() &&
      needs.changes.outputs.rust == 'true' &&
      (needs.web.result == 'success' || needs.web-build-only.result == 'success') &&
      (github.event_name == 'push' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    env:
      # Override workspace RUSTFLAGS — coverage builds with cfg(coverage) make
      # main.rs-only code appear dead. Warnings are already caught by clippy.
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web/build/
      - run: cargo install cargo-llvm-cov
      - run: sudo apt-get update && sudo apt-get install -y tmux
      # CI runs on Linux where some platform-specific code (macOS memory parsing,
      # WSL branches) is unreachable. Local pre-commit enforces 100% on dev platform.
      # 98% threshold: cargo-llvm-cov 0.8+ counts ? error-path regions as missed,
      # and cfg(coverage) exclusions for I/O code make 99+ unreliable.
      # --test-threads=1 prevents sqlx-sqlite prepared statement cache races.
      - run: cargo llvm-cov --workspace --ignore-filename-regex "(main|embed|build)\.rs$" --fail-under-lines 98 -- --test-threads=1
