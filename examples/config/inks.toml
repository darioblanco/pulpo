# Ink presets — reusable command templates for common agent workflows.
# Use with: pulpo spawn my-task --ink reviewer

[node]
name = "my-mac"

[inks.reviewer]
description = "Code reviewer focused on correctness and security"
command = "claude -p 'Review this code for correctness, security, and performance issues.'"

[inks.coder]
description = "Coding agent with full access"
command = "claude -p 'Implement the requested changes with tests.'"

[inks.quick-fix]
description = "Fast bug fixes with Codex"
command = "codex --quiet 'Fix the issue with minimal changes and verify with tests.'"

[inks.gemini-review]
description = "Gemini CLI code review"
command = "gemini 'Review this codebase and suggest improvements.'"

[inks.shell]
description = "Interactive shell (no agent)"
command = "bash"
