[node]
name = "pulpo-inks"

[auth]
bind = "local"

[guards]
preset = "standard"
max_turns = 50
max_budget_usd = 10.0

[inks.reviewer]
provider = "claude"
mode = "interactive"
guard_preset = "strict"
instructions = "You are a code reviewer. Prioritize correctness and security."
description = "Read-only code reviewer with strict guards"

[inks.coder]
provider = "claude"
mode = "autonomous"
guard_preset = "standard"
instructions = "Implement the task with tests and clear commit messages."
description = "Full-access coding agent with standard guards"

[inks.quick-fix]
mode = "autonomous"
guard_preset = "standard"
instructions = "Fix the reported bug with minimal changes. Run tests to verify."
description = "Fast bug fixes — any provider"
