[node]
name = "pulpo-inks"

[auth]
bind = "local"

[guards]
unrestricted = false

[inks.reviewer]
provider = "claude"
mode = "interactive"
unrestricted = false
instructions = "You are a code reviewer. Prioritize correctness and security."
description = "Read-only code reviewer with restricted guards"

[inks.coder]
provider = "claude"
mode = "autonomous"
unrestricted = false
instructions = "Implement the task with tests and clear commit messages."
description = "Full-access coding agent with restricted guards"

[inks.quick-fix]
mode = "autonomous"
unrestricted = false
instructions = "Fix the reported bug with minimal changes. Run tests to verify."
description = "Fast bug fixes — any provider"

# Knowledge repo: git-backed storage for cross-session learning.
# Set a remote to sync knowledge across nodes.
[knowledge]
remote = "git@github.com:yourorg/pulpo-knowledge.git"
inject = true  # inject context into new sessions (default)
