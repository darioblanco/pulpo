[node]
name = "pulpo-inks"

[auth]
bind = "local"

[guards]
preset = "standard"
max_turns = 50
max_budget_usd = 10.0

[inks.reviewer]
provider = "claude"
model = "sonnet"
mode = "autonomous"
guard_preset = "strict"
allowed_tools = ["Read", "Glob", "Grep"]
system_prompt = "You are a code reviewer. Prioritize correctness and security."
description = "Read-only code reviewer with strict guards"
max_turns = 20
max_budget_usd = 3.0

[inks.coder]
provider = "claude"
model = "opus"
mode = "autonomous"
guard_preset = "standard"
allowed_tools = ["Read", "Write", "Edit", "Glob", "Grep", "Bash"]
system_prompt = "Implement the task with tests and clear commit messages."
description = "Full-access coding agent with standard guards"
max_turns = 80
max_budget_usd = 15.0
