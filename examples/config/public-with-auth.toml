# Public bind with auth — expose pulpod on the network with token authentication.

[node]
name = "my-server"
port = 7433
bind = "public"   # Binds to 0.0.0.0 so other devices can reach pulpod

[auth]
# Auto-generated on first run if empty. Replace with a strong token.
token = "replace-with-long-random-token"
