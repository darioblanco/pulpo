# Discord webhook notifications — get notified when sessions finish or fail.

[node]
name = "my-mac"
bind = "public"

[auth]
token = "replace-with-long-random-token"

[notifications.discord]
webhook_url = "https://discord.com/api/webhooks/123/abc"
# Only notify on these events (default: all events).
events = ["ready", "killed", "lost"]
